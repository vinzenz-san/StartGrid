# Service name kept as-is (already deployed) even though this Worker now
# proxies both Unsplash and NASA — renaming would mint a new .workers.dev
# URL and orphan the deployed one.
name = "startgrid-unsplash-proxy"
main = "api-proxy.ts"
compatibility_date = "2024-01-01"

# Set secrets via:
#   wrangler secret put UNSPLASH_ACCESS_KEY
#   wrangler secret put NASA_API_KEY
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put MS_CLIENT_ID
#   wrangler secret put MS_CLIENT_SECRET
# Optionally restrict CORS via: wrangler secret put ALLOWED_ORIGIN
